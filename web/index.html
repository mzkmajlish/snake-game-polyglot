<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050507">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Snake · Polyglot Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
    <div id="app">
        <div id="game-frame">

            <!-- HUD -->
            <div id="hud">
                <div class="hud-group">
                    <div class="hud-cell">
                        <span class="hud-label">SCORE</span>
                        <span id="score" class="hud-value">0</span>
                    </div>
                    <div class="hud-cell">
                        <span class="hud-label">BEST</span>
                        <span id="high-score" class="hud-value dim">0</span>
                    </div>
                </div>
                <div id="powerup-indicator" class="hud-powerup hidden">
                    <span id="powerup-icon" class="pu-icon"></span>
                    <span id="powerup-timer" class="pu-timer"></span>
                </div>
                <div class="hud-group">
                    <div class="hud-cell">
                        <span class="hud-label">LVL</span>
                        <span id="level" class="hud-value">1</span>
                    </div>
                    <div class="hud-cell">
                        <span class="hud-label">LEN</span>
                        <span id="length" class="hud-value dim">3</span>
                    </div>
                </div>
            </div>

            <!-- Canvas -->
            <div id="canvas-wrap">
                <canvas id="game" width="600" height="600"></canvas>

                <div id="overlay">

                    <!-- ── MENU ── -->
                    <div id="menu" class="panel">

                        <div class="menu-hero">
                            <!-- decorative number, like editorial design -->
                            <span class="hero-num" aria-hidden="true">01</span>

                            <div class="hero-left">
                                <div class="title-block">
                                    <div class="title-eyebrow">POLYGLOT EDITION</div>
                                    <h1 class="title-main">SNAKE</h1>
                                </div>
                                <div class="title-meta">
                                    <span class="meta-dot"></span>
                                    <span class="meta-text">5 languages · 1 game</span>
                                </div>
                            </div>

                            <div class="hero-right">
                                <svg class="snake-mark" viewBox="0 0 64 64" aria-hidden="true">
                                    <defs>
                                        <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
                                            <stop offset="0%" stop-color="#4ade80"/>
                                            <stop offset="100%" stop-color="#166534"/>
                                        </linearGradient>
                                    </defs>
                                    <!-- body path -->
                                    <path d="M48 16 C48 16, 36 16, 28 22 C20 28, 20 36, 28 40 C36 44, 44 40, 44 48 C44 56, 32 60, 20 56"
                                          fill="none" stroke="url(#sg)" stroke-width="7"
                                          stroke-linecap="round" stroke-linejoin="round"/>
                                    <!-- head -->
                                    <circle cx="48" cy="16" r="7" fill="url(#sg)"/>
                                    <!-- eye -->
                                    <circle cx="51" cy="13" r="2" fill="#020204"/>
                                    <circle cx="51.7" cy="12.3" r="0.8" fill="rgba(255,255,255,0.5)"/>
                                    <!-- tongue -->
                                    <path d="M55 16 L60 13.5 M55 16 L60 18.5"
                                          fill="none" stroke="#f87171" stroke-width="1.2" stroke-linecap="round"/>
                                </svg>
                            </div>
                        </div>

                        <div class="menu-body">

                            <!-- Mode toggle -->
                            <div class="section-label">MODE</div>
                            <div id="modes">
                                <button class="mode-btn selected" data-mode="arcade">
                                    <span class="mode-name">Arcade</span>
                                    <span class="mode-tag">wrap · power-ups · obstacles</span>
                                </button>
                                <button class="mode-btn" data-mode="classic">
                                    <span class="mode-name">Classic</span>
                                    <span class="mode-tag">walls kill · pure skill</span>
                                </button>
                            </div>

                            <!-- Speed -->
                            <div class="speed-row">
                                <div class="section-label">SPEED</div>
                                <div class="speed-options">
                                    <button class="spd-btn" data-spd="1">Slow</button>
                                    <button class="spd-btn selected" data-spd="2">Normal</button>
                                    <button class="spd-btn" data-spd="3">Fast</button>
                                </div>
                            </div>

                            <button id="play-btn">
                                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M3 2l11 6-11 6V2z" fill="currentColor"/></svg>
                                Play
                            </button>
                        </div>

                        <div class="menu-footer">
                            <div class="controls-ref">
                                <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
                                <span class="sep">or arrows</span>
                                <span class="sep">·</span>
                                <kbd>Space</kbd><span class="sep">/</span><kbd>Esc</kbd>
                                <span class="sep">pause</span>
                            </div>
                            <p class="swipe-hint">Swipe to move · Tap to pause</p>
                            <div class="lang-tags">
                                <span class="tag js">JavaScript</span>
                                <span class="tag py">Python</span>
                                <span class="tag cc">C</span>
                                <span class="tag rs">Rust</span>
                                <span class="tag go">Go</span>
                            </div>
                        </div>
                    </div>

                    <!-- ── DEATH ── -->
                    <div id="death" class="panel hidden">
                        <div class="death-top">
                            <div class="death-label">GAME OVER</div>
                            <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
                                <path d="M8 8l16 16M24 8L8 24" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div id="death-stats">
                            <div class="d-stat">
                                <span class="d-val" id="d-score">0</span>
                                <span class="d-label">Score</span>
                            </div>
                            <div class="d-divider"></div>
                            <div class="d-stat">
                                <span class="d-val" id="d-level">1</span>
                                <span class="d-label">Level</span>
                            </div>
                            <div class="d-divider"></div>
                            <div class="d-stat">
                                <span class="d-val" id="d-length">3</span>
                                <span class="d-label">Length</span>
                            </div>
                        </div>
                        <p id="new-best" class="hidden">⬆ New personal best</p>
                        <button id="retry-btn">Play again</button>
                    </div>

                    <!-- ── PAUSE ── -->
                    <div id="pause" class="panel hidden">
                        <div class="pause-inner">
                            <div class="pause-bars" aria-hidden="true">
                                <span></span><span></span>
                            </div>
                            <div>
                                <div class="pause-label">PAUSED</div>
                                <p class="pause-hint"><kbd>Space</kbd> or <kbd>Esc</kbd> to resume</p>
                            </div>
                        </div>
                    </div>

                </div><!-- /overlay -->
            </div><!-- /canvas-wrap -->
        </div><!-- /game-frame -->

        <!-- Touch d-pad -->
        <div id="touch-controls">
            <button class="t-btn" data-dir="up" aria-label="Up">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M7 14l5-5 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="t-row">
                <button class="t-btn" data-dir="left" aria-label="Left">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M14 7l-5 5 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="t-btn" data-dir="down" aria-label="Down">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="t-btn" data-dir="right" aria-label="Right">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M10 7l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="game.js?v=9"></script>
</body>
</html>
